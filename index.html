<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maths Diagnostic Tool</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:#fff;
}
button {
  padding:15px;
  margin:8px 0;
  width:100%;
}
#app {
  max-width:700px;
  margin:auto;
  padding:20px;
}
.pill {
  background:#222;
  padding:6px 10px;
  border-radius:10px;
  display:inline-block;
  margin:5px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

// ======================
// SETTINGS
// ======================
const CSV_FILE = "questions.csv";

// ======================
// STATE
// ======================
let questions = [];
let currentQuestions = [];
let currentIndex = 0;

let progress = JSON.parse(localStorage.getItem("progress") || "{}");

// ======================
// 🔥 GAMIFICATION
// ======================
let currentStreak = 0;

function playSound(type){
  let sound = new Audio(
    type==="correct"
    ? "https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"
    : "https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"
  );
  sound.volume = 0.3;
  sound.play();
}

function showPopup(text){
  const popup = document.createElement("div");
  popup.innerText = text;
  popup.style.position="fixed";
  popup.style.top="30%";
  popup.style.left="50%";
  popup.style.transform="translate(-50%,-50%)";
  popup.style.background="#222";
  popup.style.padding="20px";
  popup.style.borderRadius="10px";
  document.body.appendChild(popup);
  setTimeout(()=>popup.remove(),2000);
}

function handleGamification(correct){
  if(correct){
    currentStreak++;
    playSound("correct");

    if(currentStreak===5) showPopup("🔥 5 Streak!");
    if(currentStreak===10) showPopup("⚡ 10 Streak!");
    if(currentStreak===15) showPopup("🚀 15 Streak!");
    if(currentStreak===20) showPopup("🏆 20 Streak!");
  } else {
    currentStreak = 0;
    playSound("wrong");
  }
}

// ======================
// PROGRESS SYSTEM
// ======================
function getProgress(q){
  return progress[q.Question] || {correct:0};
}

function updateProgress(q, correct){
  if(!progress[q.Question]) progress[q.Question]={correct:0};

  if(correct) progress[q.Question].correct++;

  localStorage.setItem("progress", JSON.stringify(progress));
}

function isSecure(q){
  return getProgress(q).correct >= 3;
}

// ======================
// LOAD CSV
// ======================
function load(){
  Papa.parse(CSV_FILE,{
    download:true,
    header:true,
    complete:(res)=>{
      questions = res.data.filter(q=>q.Question);
      home();
    }
  });
}

// ======================
// HOME
// ======================
function home(){
  document.getElementById("app").innerHTML = `
    <h1>Maths Diagnostic Tool</h1>

    <button onclick="startDiagnostic()">Start Diagnostic</button>
    <button onclick="startPractice()">Practice</button>
    <button onclick="startRevision()">Revision List</button>
  `;
}

// ======================
// MODES
// ======================
function startDiagnostic(){
  currentQuestions = shuffle(questions).slice(0,20);
  currentIndex = 0;
  renderQuestion();
}

function startPractice(){
  currentQuestions = shuffle(questions);
  currentIndex = 0;
  renderQuestion();
}

function startRevision(){
  currentQuestions = questions.filter(q=>getProgress(q).correct < 3);
  currentIndex = 0;
  renderQuestion();
}

// ======================
// QUESTION
// ======================
function renderQuestion(){
  let q = currentQuestions[currentIndex];

  if(!q){
    document.getElementById("app").innerHTML = "<h2>Finished</h2><button onclick='home()'>Home</button>";
    return;
  }

  document.getElementById("app").innerHTML = `
    <div class="pill">🔥 Streak: ${currentStreak}</div>
    <div class="pill">Secure: ${getProgress(q).correct}/3</div>

    <h2>${q.Question}</h2>

    <button onclick="answer('A')">A. ${q["Option A"]}</button>
    <button onclick="answer('B')">B. ${q["Option B"]}</button>
    <button onclick="answer('C')">C. ${q["Option C"]}</button>
    <button onclick="answer('D')">D. ${q["Option D"]}</button>
  `;
}

// ======================
// ANSWER
// ======================
function answer(letter){
  let q = currentQuestions[currentIndex];
  let correct = q["Correct Letter"] === letter;

  handleGamification(correct);
  updateProgress(q, correct);

  currentIndex++;

  setTimeout(renderQuestion,500);
}

// ======================
// HELPERS
// ======================
function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

// ======================
load();

</script>

</body>
</html>
